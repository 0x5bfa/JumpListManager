name: JumpListManager CD

on:
  workflow_dispatch:

env:
  WORKING_DIR:           '${{ github.workspace }}' # 'D:\a\JumpListManager\JumpListManager'
  SOLUTION_PATH:         '${{ github.workspace }}\JumpListManager.slnx'
  WASDK_PROJ_PATH:       '${{ github.workspace }}\JumpListManager.Samples.WinUI\JumpListManager.Samples.WinUI.csproj'
  UWP_PROJ_PATH:         '${{ github.workspace }}\JumpListManager.Samples.Uwp\JumpListManager.Samples.Uwp.csproj'

jobs:

  build:
    runs-on: windows-latest
    env:
      CONFIGURATION: 'Release'
      PLATFORM: 'x64'

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    - name: Setup .NET
      uses: actions/setup-dotnet@v4

    - name: Build the WASDK sample
      run: msbuild /restore $env:ENTRYPOINT_PROJ_PATH /p:Configuration=$env:CONFIGURATION /p:Platform=$env:PLATFORM /p:AppxBundle=Never
